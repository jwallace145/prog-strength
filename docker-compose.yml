services:
  # One-shot restore from S3 before the API opens the DB. Skips when a
  # local /data/app.db already exists (so a redeploy on the same host
  # doesn't clobber live data) and when no replica is in S3 (first-ever
  # boot, before any backups have been written). The api service waits
  # for this to exit 0 via the depends_on condition below.
  restore:
    image: litestream/litestream:0.3.13
    environment:
      - LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
      - LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION:-us-east-2}
    volumes:
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command:
      - restore
      - -if-db-not-exists
      - -if-replica-exists
      - -config
      - /etc/litestream.yml
      - /data/app.db
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    # No `ports:` — the api is only reachable on the docker-compose
    # internal network. Caddy is the only public-facing container.
    expose:
      - "8080"
    environment:
      - DATABASE_URL=/data/app.db
      - SERVER_ADDR=:8080
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - DEV_AUTH=${DEV_AUTH}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN}
      - RETURN_TO_ALLOWED_ORIGINS=${RETURN_TO_ALLOWED_ORIGINS}
    volumes:
      # Persist SQLite database on host
      - ./data:/data
    restart: unless-stopped
    depends_on:
      restore:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Long-running sidecar: streams WAL frames to S3 continuously. Shares
  # /data with the api container so it sees app.db and app.db-wal as the
  # api writes to them. Waits for the api to come up healthy so we don't
  # log spurious "db not found" errors during cold start.
  litestream:
    image: litestream/litestream:0.3.13
    environment:
      - LITESTREAM_REPLICA_BUCKET=${LITESTREAM_REPLICA_BUCKET}
      - LITESTREAM_REPLICA_REGION=${LITESTREAM_REPLICA_REGION:-us-east-2}
    volumes:
      - ./data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate", "-config", "/etc/litestream.yml"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddyfile is owned by prog-strength-infra, which is cloned to
      # /home/ubuntu/prog-strength-infra on the host. The release workflow
      # `git pull`s that repo before each deploy so the mounted file is
      # current. CADDY_CONFIG_DIR lets local/dev override the host path.
      #
      # We mount the *directory* (not the single Caddyfile inside it) so
      # that `git pull` updates are visible inside the container. Single-
      # file bind mounts on Linux are inode-bound — git's rename-based
      # working-tree update would leave the container pointed at the old
      # inode, so caddy reload would silently no-op. Mounting the parent
      # directory gives late-binding semantics: file replacements inside
      # propagate immediately.
      - ${CADDY_CONFIG_DIR:-/home/ubuntu/prog-strength-infra/caddy}:/etc/caddy:ro
      # caddy_data MUST persist — it stores issued Let's Encrypt certs
      # and the ACME account key. Wiping it forces re-issuance and will
      # quickly trip Let's Encrypt's rate limits.
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:

# Shared with prog-strength-mcp (and any future sibling services) so Caddy
# can reverse-proxy to them by service name (e.g. `mcp:8000`). Lifecycle
# is owned by the host — bootstrap.sh creates it once, and `external: true`
# prevents `docker compose down` from removing it while mcp is still
# attached.
networks:
  default:
    name: prog-strength
    external: true
