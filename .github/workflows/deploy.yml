name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/prog-strength
            git pull origin main
            docker compose down
            docker compose up --build -d
            echo "Deployment complete. Checking service status..."
            docker compose ps
            echo "Recent logs:"
            docker compose logs --tail=50
